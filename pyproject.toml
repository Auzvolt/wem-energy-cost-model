[build-system]
requires = ["setuptools>=70", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "wem-energy-cost-model"
version = "0.1.0"
description = "WEM Energy Cost Modelling Tool for the WA Wholesale Energy Market"
requires-python = ">=3.11"
dependencies = [
    # Web / UI
    "streamlit>=1.33",
    "plotly>=5.20",
    "kaleido>=0.2.1",       # required for plotly static PNG/SVG export (#42)
    # Data
    "pandas>=2.2",
    "numpy>=1.26",
    "numpy-financial>=1.0", # NPV/IRR — numpy.irr/npv removed in numpy 2.0 (#34)
    "openpyxl>=3.1",
    "httpx>=0.27",
    "aiohttp>=3.9",
    # Database
    "psycopg[binary]>=3.1",
    "psycopg-pool>=3.2",
    "alembic>=1.13",
    "sqlalchemy>=2.0",
    # Optimisation
    "pyomo>=6.7",
    # NOTE: highspy has no prebuilt wheels on all CI platforms; install via [solver] extra
    # Financial
    "scipy>=1.13",
    # Reporting — pure-Python, no system libs required (avoids weasyprint/libpango)
    "reportlab>=4.0",
    "fpdf2>=2.7",
    # Config
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "ruff>=0.4,<0.10",
    "mypy>=1.10",
    "types-requests",
    "aiosqlite>=0.19.0",    # SQLite async driver for testing without Postgres
    "pre-commit>=3.7",
]

# HiGHS solver — optional; has prebuilt wheels on most platforms
# Install with: pip install -e ".[solver]"
solver = [
    "highspy>=1.7",
]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
