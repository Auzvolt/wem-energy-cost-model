[build-system]
requires = ["setuptools>=70", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "wem-energy-cost-model"
version = "0.1.0"
description = "WEM Energy Cost Modelling Tool for the WA Wholesale Energy Market"
requires-python = ">=3.11"
dependencies = [
    # Web / UI
    "streamlit>=1.33",
    "plotly>=5.20",
    # Data
    "pandas>=2.2",
    "numpy>=1.26",
    "httpx>=0.27",
    "aiohttp>=3.9",
    # Database
    "psycopg[binary]>=3.1",
    "psycopg-pool>=3.2",
    "alembic>=1.13",
    "sqlalchemy>=2.0",
    # Optimisation
    "pyomo>=6.7",
    "highspy>=1.7",   # HiGHS solver (open-source, no extra install needed)
    # Financial
    "scipy>=1.13",
    # Config
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "python-dotenv>=1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "mypy>=1.10",
    "types-requests",
]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--cov=. --cov-report=term-missing"
