[server]
# Required for Streamlit Community Cloud
headless = true
enableCORS = false
enableXsrfProtection = true
# Disable file watcher on cloud (no local file changes expected)
runOnSave = false
# Max upload size for data files (MB)
maxUploadSize = 50

[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#1f6fad"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[logger]
# Structured JSON logging for cloud log aggregation
level = "info"
